{% extends 'core/base.html' %}
{% load django_bootstrap5 %}

{% block title %}Sign Up - MIU Store{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">Create an Account</h3>
            <form method="post">
                {% csrf_token %}
                {% bootstrap_form form %}
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="togglePasswords">
                    <label class="form-check-label" for="togglePasswords">Show Passwords</label>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('togglePasswords').addEventListener('change', function() {
        const passwordFields = document.querySelectorAll('input[type="password"]');
        passwordFields.forEach(field => {
            field.type = this.checked ? 'text' : 'password';
        });
    });
</script>
{% endblock %}
